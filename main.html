<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="main.css" rel="stylesheet">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body data-bs-theme="dark">
    <nav id="navbar" class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href=""><i class="bi bi-gear-wide-connected"></i> Dion McMillan</a>
            <button class="navbar-toggler" type="button" data-bs-spy="scroll" data-bs-toggle="collapse" data-bs-target="#navbarText" data-bs-offset="300" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#scrollspyAbout">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#scrollspyProjects">Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#scrollspyInterests">Interests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#scrollspyCV">CV</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


<main>
    <section id="scrollspyAbout">
        <div class="container-fluid">
            <div class="container">
                <section id="about-me hero">
                    <div class="row">
                        <div class="col hero-text">
                            I am a creature
                        </div>
                    </div>
                </section>
            </div>
            <canvas class="mx-0 px-0" id="bg" style="padding-top: 75px"></canvas>
        </div>
    </section>

    <section id="scrollspyProjects">
        <div class="section-title px-0 mx-0 pt-2 pb-1 text-end">
            <div class="container">
                <div class="row">
                    <h1>Projects</h1>
                </div>
            </div>
        </div>
        <div class="container-fluid section-odd px-0 mx-0">
            <div class="container">
                <div class="row">
                    <div class="col text-end z-0" id="">
                        <nav class="sticky-top" style="padding-top: 30%;">
                            <ul class="nav flex-column" id="project-link-list">

                            </ul>
                        </nav>

                        <!-- Creates a list of project section links in main.js -->
                    </div>
                    <div class="col-10 projects scrollspy-projects" id="project-history" data-bs-offset="0px 0px -25%" data-bs-spy="scroll" data-bs-target="#project-link-list" tabindex="0" data-bs-smooth-scroll="true" >

                    </div>
                </div>
            </div>

        </div>
    </section>

    <section id="scrollspyInterests">
        <div class="section-title px-0 mx-0 pt-2 pb-1 text-end">
            <div class="container">
                <div class="row">
                    <h1>Interests</h1>
                </div>
            </div>
        </div>
        <div class="container-fluid section-even text-end">
            <div class="container">
                <section class="interests">
                    <div class="spacer"></div>
                </section>
            </div>
        </div>
    </section>

    <section id="scrollspyCV">
        <div class="section-title px-0 mx-0 pt-2 pb-1 text-end">
            <div class="container">
                <div class="row">
                    <h1>Interests</h1>
                </div>
            </div>
        </div>
        <div class="container-fluid section-even text-end">
            <div class="container">
                <section class="CV">
                    <div class="spacer"></div>
                </section>
            </div>
        </div>
    </section>

</main>

<footer>

</footer>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script src="main.js" crossorigin="anonymous"></script>
<script src="particle-background.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>

</body>
</html>
